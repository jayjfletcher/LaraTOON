name: Release

on:
  workflow_dispatch:
    inputs:
      type:
        description: "Type of Release"
        type: choice
        default: minor
        options:
          - major
          - minor
          - hotfix

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release runs from main
        run: |
          if [[ "$GITHUB_REF_NAME" != "main" ]]; then
            echo "Releases may only be run against main."
            exit 1
          fi

  pest:
    name: Pest
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Run Pest
        run: composer test

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Run PHPStan
        run: composer phpstan

  tag:
    name: Tag
    runs-on: ubuntu-latest
    needs:
      - pest
      - phpstan
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          git fetch --tags origin || true
          LATEST_TAG=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null || echo "v0.0.0")
          echo "Previous tag $LATEST_TAG"
          TAG=$(./bin/increment_version.sh "$LATEST_TAG" "${{ inputs.type }}")
          echo "New tag $TAG"
          git tag "$TAG"
          git push origin "$TAG"
